name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Gemini CLI (for validate)
        run: npm install -g @google/gemini-cli
      - name: Detect changed packages
        id: changes
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          BASE="${BASE_REF:-main}"
          git fetch origin "$BASE" --depth=50 || true
          CHANGED=$(git diff --name-only "origin/$BASE" HEAD -- packages/ | cut -d/ -f2 | sort -u | tr '\n' ' ')
          echo "packages=$CHANGED" >> "$GITHUB_OUTPUT"
      - name: Validate each changed package
        if: steps.changes.outputs.packages != ''
        env:
          CHANGED_PACKAGES: ${{ steps.changes.outputs.packages }}
        run: |
          for pkg in $CHANGED_PACKAGES; do
            if [ -d "packages/$pkg" ]; then
              echo "::group::Validate $pkg"
              gemini extensions validate "packages/$pkg" || exit 1
              echo "::endgroup::"
            fi
          done
      - name: Node tests per package
        if: steps.changes.outputs.packages != ''
        env:
          CHANGED_PACKAGES: ${{ steps.changes.outputs.packages }}
        run: |
          for pkg in $CHANGED_PACKAGES; do
            if [ -d "packages/$pkg" ]; then
              test_count=$(find "packages/$pkg" -name "*.test.js" | wc -l)
              if [ "$test_count" -gt 0 ]; then
                echo "::group::Test $pkg ($test_count test files)"
                (cd "packages/$pkg" && node --test) || exit 1
                echo "::endgroup::"
              fi
            fi
          done
